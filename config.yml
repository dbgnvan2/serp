serpapi:
  engine: google
  gl: ca
  hl: en
  location: Vancouver, British Columbia, Canada
  num: 100
  device: desktop
  google_max_pages: 3
  google_max_results: 300
  maps_max_pages: 3
  retry_max_attempts: 3
  retry_backoff_seconds: 1.0
  request_delay_seconds: 0.2
  no_cache: false
  ai_fallback_without_location: true
  related_questions_ai_followup: true
  related_questions_ai_max_calls: 5
files:
  input_csv: keywords_Couple_Marriage_RelationshipLocal.csv
  output_xlsx: market_analysis_couple_marriage_relationshiplocal_20260329_1536.xlsx
  output_json: market_analysis_couple_marriage_relationshiplocal_20260329_1536.json
  output_md: market_analysis_couple_marriage_relationshiplocal_20260329_1536.md
  domain_overrides: domain_overrides.yml
enrichment:
  enabled: true
  max_urls_per_keyword: 5
  timeout_seconds: 10
  user_agent: MarketIntelligenceBot/1.0
  enable_domain_age: false
app:
  force_local_intent: true
  balanced_mode: true
  deep_research_mode: false
  ai_query_priority_actions:
  - defend
  - strengthen
  - enter_cautiously
moz:
  # Moz Links API v2 caching settings.
  # Credentials are read from MOZ_ACCESS_ID and MOZ_SECRET_KEY env vars.
  # DA changes slowly (monthly scale) so a long TTL is appropriate.
  cache_ttl_days: 30

feasibility:
  # Domain Authority gap analysis and hyper-local pivot suggestions.
  # Set enabled: false to skip entirely when no Moz credentials are set.
  enabled: true

  # Domain Authority of the non-profit client.
  # Update manually when Moz reports a change — DA moves on a monthly scale.
  client_da: 35

  # Broad location label used in pivot strategy explanation text.
  non_profit_location: North Vancouver

  # When true, a secondary SERP + Maps fetch is triggered for the top
  # neighbourhood pivot variant of every Low Feasibility keyword.
  # Maps is always included (force_local_intent: true) so the local 3-pack
  # is checked for client domain presence — the geographic relevance signal.
  # Each Low Feasibility keyword costs one additional SerpAPI credit.
  pivot_serp_fetch: true

  # Ordered neighbourhood list for pivot variant generation.
  # The first entry is the default "suggested" pivot (deterministic).
  # All entries appear in the all_variants list in reports.
  neighborhoods:
  - Lonsdale
  - Edgemont Village
  - Lynn Valley
  - Deep Cove
  - Canyon Heights

analysis_report:
  client_name: Living Systems Counselling
  client_domain: livingsystems.ca
  client_name_patterns:
  - Living Systems
  org_type: Small nonprofit counselling organization, established 1971
  location: North Vancouver, BC, Canada
  framework_description: Bowen Family Systems Theory. Core concepts include differentiation
    of self, emotional cutoff, triangles, and multigenerational transmission.
  content_focus: Counselling services, Bowen Theory training programs, conferences,
    and educational content.
  additional_context: Budget is limited. Prioritize practical recommendations that
    fit a small nonprofit and avoid mismatched audiences such as court-mandated reunification
    services.
